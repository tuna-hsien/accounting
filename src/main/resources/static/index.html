<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>帳冊 — 智慧記帳</title>
<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.0/chart.umd.min.js"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@500;700;900&family=IBM+Plex+Mono:wght@500;600&family=Noto+Sans+TC:wght@400;500;600&display=swap" rel="stylesheet">
<style>
  :root{
    --ink:#23241F;
    --ink-soft:#6B6963;
    --paper:#FAF8F4;
    --paper-card:#FFFFFF;
    --cover:#1B3A2F;
    --cover-light:#2B5240;
    --thread:#D8CFC0;
    --akafont:#B33A3A;
  }
  *{ box-sizing:border-box; }
  body{
    background-color:var(--paper);
    color:var(--ink);
    font-family:'Noto Sans TC', sans-serif;
    background-image:
      linear-gradient(var(--thread) 1px, transparent 1px);
    background-size: 100% 2.6rem;
    background-position: 0 7.4rem;
  }
  .font-display{ font-family:'Noto Serif TC', serif; }
  .font-mono{ font-family:'IBM Plex Mono', monospace; }

  /* 帳本裝訂線：左側一條打孔感的直線，貫穿輸入卡片 */
  .ledger-spine{
    position:relative;
  }
  .ledger-spine::before{
    content:'';
    position:absolute;
    left:2.25rem;
    top:1.5rem;
    bottom:1.5rem;
    width:1px;
    background-image: repeating-linear-gradient(to bottom, var(--thread) 0, var(--thread) 6px, transparent 6px, transparent 12px);
  }

  /* 印章式按鈕：按下時的回彈手感 */
  .stamp-btn{
    transition: transform .15s cubic-bezier(.34,1.56,.64,1), box-shadow .15s ease, background-color .2s ease;
    box-shadow: 0 4px 0 0 rgba(0,0,0,0.18);
  }
  .stamp-btn:active{
    transform: translateY(3px);
    box-shadow: 0 1px 0 0 rgba(0,0,0,0.18);
  }
  .stamp-btn:disabled{
    opacity:.7;
    cursor:not-allowed;
  }

  .row-enter{
    animation: rowFade .4s ease both;
  }
  @keyframes rowFade{
    from{ opacity:0; transform: translateY(-6px); }
    to{ opacity:1; transform: translateY(0); }
  }

  .spinner{
    border: 2.5px solid rgba(255,255,255,0.35);
    border-top-color: #fff;
    border-radius: 50%;
    width: 1rem;
    height: 1rem;
    animation: spin .7s linear infinite;
  }
  @keyframes spin{ to{ transform: rotate(360deg); } }

  .category-chip{
    display:inline-flex;
    align-items:center;
    gap:.35rem;
    font-size:.75rem;
    font-weight:600;
    padding:.2rem .65rem;
    border-radius: 999px;
  }

  .scrollbar-thin::-webkit-scrollbar{ width:6px; }
  .scrollbar-thin::-webkit-scrollbar-thumb{ background:var(--thread); border-radius:3px; }

  .skeleton{
    background: linear-gradient(90deg, #EFEAE0 25%, #F5F1E9 37%, #EFEAE0 63%);
    background-size: 400% 100%;
    animation: shimmer 1.4s ease infinite;
  }
  @keyframes shimmer{
    0%{ background-position: 100% 50%; }
    100%{ background-position: 0 50%; }
  }

  @media (prefers-reduced-motion: reduce){
    *{ animation-duration: .001s !important; transition-duration: .001s !important; }
  }
</style>
</head>
<body class="min-h-screen">

  <!-- 頂部標頭 -->
  <header class="px-6 md:px-12 pt-10 pb-4">
    <div class="max-w-5xl mx-auto flex items-center justify-between">
      <div>
        <p class="font-mono text-xs tracking-[0.2em] uppercase" style="color:var(--ink-soft)">LEDGER · 智慧帳冊</p>
        <h1 class="font-display text-3xl md:text-4xl font-bold mt-1" style="color:var(--cover)">說一句話，記一筆帳</h1>
      </div>
      <div class="hidden md:block text-right">
        <p class="font-mono text-xs" style="color:var(--ink-soft)" id="todayLabel"></p>
      </div>
    </div>
  </header>

  <!-- 輸入區 -->
  <section class="px-6 md:px-12 mb-10">
    <div class="max-w-5xl mx-auto">
      <div class="ledger-spine rounded-2xl p-6 md:p-8 pl-12 md:pl-16" style="background:var(--paper-card); box-shadow: 0 1px 3px rgba(27,58,47,0.08), 0 12px 28px -12px rgba(27,58,47,0.18);">
        <form id="expenseForm" class="flex flex-col md:flex-row gap-3 md:items-stretch">
          <input
            id="textInput"
            type="text"
            autocomplete="off"
            placeholder="請輸入你的消費描述（例如：晚餐吃牛肉麵 130 元）"
            class="flex-1 bg-transparent outline-none text-lg font-display placeholder:text-stone-400 border-b-2 border-stone-200 focus:border-[var(--cover)] transition-colors py-2"
            style="color:var(--ink)"
          />
          <button
            id="submitBtn"
            type="submit"
            class="stamp-btn shrink-0 rounded-xl px-7 py-3 font-bold text-white flex items-center justify-center gap-2 whitespace-nowrap"
            style="background:var(--cover);"
          >
            <span id="btnLabel">蓋章入帳</span>
          </button>
        </form>
        <p id="statusLine" class="font-mono text-sm mt-3 min-h-[1.25rem] transition-opacity" style="color:var(--ink-soft)"></p>
      </div>
    </div>
  </section>

  <!-- 主儀表板 -->
  <main class="px-6 md:px-12 pb-16">
    <div class="max-w-5xl mx-auto grid grid-cols-1 lg:grid-cols-[1.4fr_1fr] gap-6">

      <!-- 歷史列表 -->
      <div class="rounded-2xl overflow-hidden" style="background:var(--paper-card); box-shadow: 0 1px 3px rgba(27,58,47,0.08), 0 12px 28px -12px rgba(27,58,47,0.18);">
        <div class="px-6 pt-5 pb-3 flex items-baseline justify-between">
          <h2 class="font-display text-xl font-bold" style="color:var(--cover)">記帳明細</h2>
          <span id="countLabel" class="font-mono text-xs" style="color:var(--ink-soft)"></span>
        </div>
        <div id="listContainer" class="px-2 md:px-3 pb-4 max-h-[34rem] overflow-y-auto scrollbar-thin">
          <!-- JS 動態渲染 -->
        </div>
      </div>

      <!-- 圖表 + 摘要 -->
      <div class="flex flex-col gap-6">
        <div class="rounded-2xl p-6" style="background:var(--paper-card); box-shadow: 0 1px 3px rgba(27,58,47,0.08), 0 12px 28px -12px rgba(27,58,47,0.18);">
          <h2 class="font-display text-xl font-bold mb-1" style="color:var(--cover)">分類占比</h2>
          <p class="font-mono text-xs mb-4" style="color:var(--ink-soft)">CATEGORY BREAKDOWN</p>
          <div class="relative" style="height: 230px;">
            <canvas id="categoryChart"></canvas>
          </div>
          <div id="chartEmpty" class="hidden text-center py-10 font-mono text-sm" style="color:var(--ink-soft)">尚無資料，記下第一筆帳吧</div>
        </div>

        <div class="rounded-2xl p-6" style="background:var(--cover);">
          <p class="font-mono text-xs uppercase tracking-wider text-white/60 mb-1">總支出</p>
          <p class="font-mono text-4xl font-semibold text-white" id="totalAmount">$0</p>
          <p class="font-mono text-xs text-white/50 mt-2" id="totalCount">0 筆紀錄</p>
        </div>
      </div>

    </div>
  </main>

<script>
const API_BASE = 'http://localhost:8080';

const CATEGORY_COLORS = {
  '餐飲': '#B33A3A',
  '交通': '#3A6FB3',
  '購物': '#C98A2E',
  '娛樂': '#7A4FB3',
  '居住': '#1B3A2F',
  '醫療': '#3AA0A0',
  '教育': '#6B6FB3',
  '水電瓦斯': '#8A8A2E',
  '保險': '#4F7A4F',
  '其他': '#8A8580'
};
function colorFor(category){
  return CATEGORY_COLORS[category] || '#8A8580';
}

const form = document.getElementById('expenseForm');
const textInput = document.getElementById('textInput');
const submitBtn = document.getElementById('submitBtn');
const btnLabel = document.getElementById('btnLabel');
const statusLine = document.getElementById('statusLine');
const listContainer = document.getElementById('listContainer');
const countLabel = document.getElementById('countLabel');
const totalAmount = document.getElementById('totalAmount');
const totalCount = document.getElementById('totalCount');
const chartEmpty = document.getElementById('chartEmpty');

let chartInstance = null;

document.getElementById('todayLabel').textContent = new Date().toLocaleDateString('zh-TW', {
  year:'numeric', month:'long', day:'numeric', weekday:'short'
});

function setLoading(isLoading){
  submitBtn.disabled = isLoading;
  textInput.disabled = isLoading;
  if(isLoading){
    btnLabel.innerHTML = '<span class="spinner"></span>';
    statusLine.textContent = 'AI 正在分析你的消費…';
  } else {
    btnLabel.textContent = '蓋章入帳';
  }
}

function setStatus(msg, isError){
  statusLine.textContent = msg || '';
  statusLine.style.color = isError ? 'var(--akafont)' : 'var(--ink-soft)';
}

function formatDateTime(iso){
  if(!iso) return '—';
  const d = new Date(iso);
  if(isNaN(d.getTime())) return iso;
  return d.toLocaleString('zh-TW', {
    month:'2-digit', day:'2-digit', hour:'2-digit', minute:'2-digit'
  });
}

function formatAmount(n){
  const num = Number(n) || 0;
  return num.toLocaleString('zh-TW');
}

function renderSkeleton(){
  listContainer.innerHTML = Array.from({length:4}).map(() => `
    <div class="flex items-center gap-4 px-4 py-4 border-b" style="border-color:#F0EBE0">
      <div class="skeleton h-10 w-10 rounded-full"></div>
      <div class="flex-1 space-y-2">
        <div class="skeleton h-3 w-2/3 rounded"></div>
        <div class="skeleton h-3 w-1/3 rounded"></div>
      </div>
      <div class="skeleton h-5 w-16 rounded"></div>
    </div>
  `).join('');
}

function renderEmptyState(){
  listContainer.innerHTML = `
    <div class="text-center py-16 px-6">
      <p class="font-display text-lg" style="color:var(--cover)">帳冊還是空的</p>
      <p class="font-mono text-xs mt-2" style="color:var(--ink-soft)">在上面說一句話，寫下第一筆帳</p>
    </div>
  `;
}

function renderErrorState(message){
  listContainer.innerHTML = `
    <div class="text-center py-16 px-6">
      <p class="font-display text-lg" style="color:var(--akafont)">讀取失敗</p>
      <p class="font-mono text-xs mt-2" style="color:var(--ink-soft)">${escapeHtml(message)}</p>
    </div>
  `;
}

function escapeHtml(str){
  const div = document.createElement('div');
  div.textContent = String(str ?? '');
  return div.innerHTML;
}

function renderList(expenses){
  if(!expenses || expenses.length === 0){
    renderEmptyState();
    return;
  }

  listContainer.innerHTML = expenses.map((e, idx) => {
    const color = colorFor(e.category);
    return `
      <div class="row-enter flex items-start gap-4 px-4 py-4 border-b last:border-b-0" style="border-color:#F0EBE0; animation-delay:${Math.min(idx,8) * 30}ms">
        <div class="w-10 h-10 rounded-full flex items-center justify-center shrink-0 mt-0.5" style="background:${color}1A">
          <span class="w-2.5 h-2.5 rounded-full" style="background:${color}"></span>
        </div>
        <div class="flex-1 min-w-0">
          <div class="flex items-center justify-between gap-3">
            <p class="text-sm truncate" style="color:var(--ink)">${escapeHtml(e.rawText)}</p>
            <p class="font-mono text-base font-semibold shrink-0" style="color:var(--ink)">$${formatAmount(e.amount)}</p>
          </div>
          <div class="flex items-center gap-2 mt-1.5 flex-wrap">
            <span class="category-chip" style="background:${color}1A; color:${color}">${escapeHtml(e.category)}</span>
            <span class="font-mono text-xs" style="color:var(--ink-soft)">${formatDateTime(e.createdAt)}</span>
          </div>
          ${e.aiAdvice ? `<p class="text-xs mt-2 italic" style="color:var(--ink-soft)">💡 ${escapeHtml(e.aiAdvice)}</p>` : ''}
        </div>
      </div>
    `;
  }).join('');
}

function renderChart(expenses){
  const totals = {};
  expenses.forEach(e => {
    const cat = e.category || '其他';
    totals[cat] = (totals[cat] || 0) + (Number(e.amount) || 0);
  });

  const labels = Object.keys(totals);
  const data = Object.values(totals);

  const canvas = document.getElementById('categoryChart');

  if(labels.length === 0){
    canvas.style.display = 'none';
    chartEmpty.classList.remove('hidden');
    if(chartInstance){ chartInstance.destroy(); chartInstance = null; }
    return;
  }
  canvas.style.display = 'block';
  chartEmpty.classList.add('hidden');

  if(chartInstance){
    chartInstance.data.labels = labels;
    chartInstance.data.datasets[0].data = data;
    chartInstance.data.datasets[0].backgroundColor = labels.map(colorFor);
    chartInstance.update();
    return;
  }

  chartInstance = new Chart(canvas, {
    type: 'doughnut',
    data: {
      labels,
      datasets: [{
        data,
        backgroundColor: labels.map(colorFor),
        borderColor: '#FFFFFF',
        borderWidth: 2,
        hoverOffset: 6
      }]
    },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      cutout: '62%',
      plugins: {
        legend: {
          position: 'bottom',
          labels: {
            font: { family: "'Noto Sans TC', sans-serif", size: 11 },
            color: '#6B6963',
            padding: 12,
            usePointStyle: true,
            pointStyle: 'circle'
          }
        },
        tooltip: {
          callbacks: {
            label: (ctx) => `${ctx.label}：$${formatAmount(ctx.parsed)}`
          }
        }
      }
    }
  });
}

function renderSummary(expenses){
  const total = expenses.reduce((sum, e) => sum + (Number(e.amount) || 0), 0);
  totalAmount.textContent = `$${formatAmount(total)}`;
  totalCount.textContent = `${expenses.length} 筆紀錄`;
  countLabel.textContent = expenses.length ? `共 ${expenses.length} 筆` : '';
}

async function loadExpenses(){
  renderSkeleton();
  try{
    const res = await fetch(`${API_BASE}/api/expenses`);
    if(!res.ok){
      throw new Error(`伺服器回應 ${res.status}`);
    }
    const data = await res.json();
    renderList(data);
    renderChart(data);
    renderSummary(data);
  }catch(err){
    console.error('載入記帳紀錄失敗', err);
    renderErrorState('無法連接後端服務，請確認伺服器是否啟動');
    renderChart([]);
    renderSummary([]);
  }
}

form.addEventListener('submit', async (event) => {
  event.preventDefault();
  const text = textInput.value.trim();
  if(!text){
    setStatus('請先輸入消費描述', true);
    return;
  }

  setLoading(true);
  setStatus('AI 正在分析你的消費…');

  try{
    const res = await fetch(`${API_BASE}/api/expenses`, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ text })
    });

    if(!res.ok){
      let message = `記帳失敗（${res.status}）`;
      try{
        const errBody = await res.json();
        if(errBody && errBody.error) message = errBody.error;
      }catch(_){}
      throw new Error(message);
    }

    textInput.value = '';
    setStatus('記帳成功，已更新帳冊', false);
    await loadExpenses();
  }catch(err){
    console.error('送出記帳失敗', err);
    setStatus(err.message || '記帳失敗，請稍後再試', true);
  }finally{
    setLoading(false);
  }
});

loadExpenses();
</script>
</body>
</html>
