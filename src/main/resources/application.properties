# ============================================
# Gemini API 設定
# ============================================
# 強烈建議用環境變數注入，避免金鑰進版控：
#   export GEMINI_API_KEY=your_actual_key
gemini.api.key=${GEMINI_API_KEY}
gemini.api.model=gemini-2.5-flash
gemini.api.base-url=https://generativelanguage.googleapis.com/v1beta

# ============================================
# H2 In-Memory Database 設定（黑客松快速啟動用）
# ============================================
# DB_CLOSE_DELAY=-1：確保 JVM 還活著時記憶體資料庫不會被清空
#   （沒這個參數，連線池一空閒就可能整個資料庫被釋放，資料瞬間消失）
spring.datasource.url=jdbc:h2:mem:expensedb;DB_CLOSE_DELAY=-1
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
# ddl-auto=update：啟動時依 Entity 自動建表/更新表結構，不用手動寫 schema.sql
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# ============================================
# H2 Console（選用，方便在瀏覽器直接看資料庫內容）
# 啟動後開 http://localhost:8080/h2-console
# JDBC URL 要填跟上面 spring.datasource.url 完全一樣的值
# ============================================
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

server.port=${PORT:8080}